  </div>

  <div id="view-summary" class="view active">
    <div class="cashbox">
      <div class="label">💰 סה״כ בקופה</div>
      <div class="amount" id="cash-amount">⏳</div>

      <div id="dist-list"></div>
      <div class="add-dist">

        </div>
        <button class="add-dist-btn" onclick="addDistribution()">הוסף חלוקה</button>
      </div>
    </div>
  </div>

    <div class="history-title-row">

var offlineMode = false;
var VIEW_ORDER = ['summary','entry','history'];
var VIEW_BTN_IDX = {summary:0,entry:1,history:2};

function navigateToView(v) {
  var btn = document.querySelectorAll('.tab-btn')[VIEW_BTN_IDX[v]];
  switchView(v, btn);
}

function monthKey(y, m) { return y + '-' + String(m+1).padStart(2,'0'); }

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getMiscItems(e) {
  if (e.miscItems && e.miscItems.length) return e.miscItems;
  if (e.misc) return [{amount:e.misc, note:e.miscNote||''}];
  return [];
}

function getMiscTotal(e) {
  return getMiscItems(e).reduce(function(s,i){ return s+(i.amount||0); }, 0);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('timeout')); }, ms); })
  ]);
}

function monthBalance(e) {
  var income = e.rent || 0;
  var exp = CATEGORIES.filter(function(c){ return c.key!=='rent'; })
              .reduce(function(s,c){ return s+(e[c.key]||0); }, 0);
  return income - exp - getMiscTotal(e);
}

function useFallback() {
  offlineMode = true;
  allData = Object.assign({}, HIST_MONTHS);
  allDist = HIST_DISTS.map(function(d){ return Object.assign({},d); });
  allDist.sort(function(a,b){ return a.date.localeCompare(b.date); });
  var banner = document.getElementById('offline-banner');
  if (banner) banner.classList.add('show');
}

async function loadAllData() {
  if (!db) { useFallback(); return; }
  try {
    var snap = await withTimeout(db.collection('months').get(), 10000);
    snap.forEach(function(d){ allData[d.id] = d.data(); });
    var dsnap = await withTimeout(db.collection('distributions').get(), 10000);
    allDist = [];
    dsnap.forEach(function(d){ allDist.push(Object.assign({id:d.id}, d.data())); });
    allDist.sort(function(a,b){ return a.date.localeCompare(b.date); });
    if (Object.keys(allData).length === 0) await seedData();
    var banner = document.getElementById('offline-banner');
    if (banner) banner.classList.remove('show');
  } catch(e) {
    console.error('Firebase:', e);
    useFallback();
  }
}

async function seedData() {
  for (var k in HIST_MONTHS) {
    await db.collection('months').doc(k).set(HIST_MONTHS[k]);
    allData[k] = HIST_MONTHS[k];
  }
  for (var i=0; i<HIST_DISTS.length; i++) {
    var d = HIST_DISTS[i];
    await db.collection('distributions').doc(d.id).set({date:d.date,yossi:d.yossi,shrolik:d.shrolik});
    allDist.push(Object.assign({},d));
  }
}

function switchView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  updateDots(v);
  if (v==='entry') renderEntry();
  if (v==='summary') renderSummary();
  if (v==='history') renderHistory();
}

function updateDots(v) {
  var idx = VIEW_ORDER.indexOf(v);
  document.querySelectorAll('.swipe-dot').forEach(function(dot, i){
    dot.classList.toggle('active', i === idx);
  });
}

function renderEntry() {
  var key = monthKey(activeYear, activeMonth);
  var entry = allData[key] || {};
  var saved = !!allData[key];
  document.getElementById('month-label').textContent = MONTHS_HE[activeMonth]+' '+activeYear;
  document.getElementById('saved-badge').textContent = saved ? '✓ נשמר' : '';
  var list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATEGORIES.forEach(function(cat) {
    var val = entry[cat.key]!==undefined ? entry[cat.key] : (saved?'':(cat.def!==undefined?cat.def:''));
    var card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML =
      '<div class="cat-icon" style="background:'+cat.color+'20">'+cat.icon+'</div>'+
      '<div class="cat-info">'+
        '<div class="cat-label">'+cat.label+'</div>'+
        '<input class="cat-input" type="number" placeholder="0" value="'+val+'" min="0"'+
          ' data-key="'+cat.key+'"'+
          ' onfocus="this.style.borderColor=\''+cat.color+'\' "'+
          ' onblur="this.style.borderColor=\'#E2E8F0\'"'+
          ' oninput="updateMonthlySummary()">'+
      '</div>'+
      '<div class="cat-value" id="val-'+cat.key+'" style="color:'+cat.color+'">'+
        (val!==''?'₪'+Number(val).toLocaleString():'')+
      '</div>';
    list.appendChild(card);
  });
  var miscSec = document.createElement('div');
  miscSec.className = 'cat-card misc-section';
  miscSec.innerHTML =
    '<div class="misc-header">'+
      '<div class="cat-icon" style="background:'+MISC_COLOR+'20">📦</div>'+
      '<div style="flex:1;font-size:13px;font-weight:600;color:#4A5568">שונות</div>'+
      '<div style="font-size:14px;font-weight:700;color:'+MISC_COLOR+'" id="misc-total"></div>'+
    '</div>'+
    '<div id="misc-rows"></div>'+
    '<button class="misc-add-btn" onclick="addMiscRow(\'\',\'\');">+ הוסף שונות</button>';
  list.appendChild(miscSec);
  getMiscItems(entry).forEach(function(item){ addMiscRow(item.note, item.amount); });
  updateMiscTotal();
  updateMonthlySummary();
  var btn = document.getElementById('save-btn');
  btn.classList.remove('saved');
  btn.textContent = 'שמור חודש';
  btn.disabled = false;
  var now = new Date();
  document.getElementById('today-btn').disabled = (activeYear===now.getFullYear()&&activeMonth===now.getMonth());
  var badge = document.getElementById('draft-badge');
  if (badge) badge.textContent = '';
  if (!saved) restoreDraft(key);
}

function updateMonthlySummary() {
  var income=0, expenses=0;
  CATEGORIES.forEach(function(cat){
    var inp = document.querySelector('[data-key="'+cat.key+'"]');
    if (!inp) return;
    var v = parseFloat(inp.value)||0;
    var el = document.getElementById('val-'+cat.key);
    if (el) el.textContent = inp.value!==''?'₪'+v.toLocaleString():'';
    if (cat.key==='rent') income=v; else expenses+=v;
  });
  document.querySelectorAll('.misc-row-amount').forEach(function(inp){ expenses+=parseFloat(inp.value)||0; });
  var bal = income-expenses;
  document.getElementById('sum-income').textContent = '₪'+income.toLocaleString();
  document.getElementById('sum-expenses').textContent = '₪'+expenses.toLocaleString();
  var balEl = document.getElementById('sum-balance');
  balEl.textContent = (bal>=0?'+':'')+'₪'+bal.toLocaleString();
  balEl.style.color = bal>=0?'#68D391':'#FEB2B2';
  scheduleDraftSave();
}

function changeMonth(dir) {
  activeMonth -= dir;
  if (activeMonth<0)  { activeMonth=11; activeYear--; }
  if (activeMonth>11) { activeMonth=0;  activeYear++; }
  renderEntry();
}

function goToToday() {
  var now = new Date();
  activeYear=now.getFullYear(); activeMonth=now.getMonth();
  renderEntry();
}

function addMiscRow(note, amount) {
  var row = document.createElement('div');
  row.className = 'misc-row';
  var mc = MISC_COLOR;
  var noteVal = escHtml(String(note||''));
  var amtVal = amount || '';
  row.innerHTML =
    '<input type="text" class="misc-row-note" placeholder="פירוט" value="'+noteVal+'"'+
    ' onfocus="this.style.borderColor=\''+mc+'\' "'+
    ' onblur="this.style.borderColor=\'#E2E8F0\'"'+
    ' oninput="scheduleDraftSave()">'+
    '<input type="number" class="misc-row-amount" placeholder="₪" min="0" value="'+amtVal+'"'+
    ' onfocus="this.style.borderColor=\''+mc+'\' "'+
    ' onblur="this.style.borderColor=\'#E2E8F0\'"'+
    ' oninput="updateMiscTotal();updateMonthlySummary()">'+
    '<button class="misc-row-del" onclick="this.closest(\'.misc-row\').remove();updateMiscTotal();updateMonthlySummary();scheduleDraftSave()">✕</button>';
  document.getElementById('misc-rows').appendChild(row);
  updateMiscTotal();
  updateMonthlySummary();
}

function updateMiscTotal() {
  var total=0;
  document.querySelectorAll('.misc-row-amount').forEach(function(inp){ total+=parseFloat(inp.value)||0; });
  var el = document.getElementById('misc-total');
  if (el) el.textContent = total>0?'₪'+total.toLocaleString():'';
}

async function saveMonth() {
  var key = monthKey(activeYear, activeMonth);
  var entry = {};
  CATEGORIES.forEach(function(cat){
    var inp = document.querySelector('[data-key="'+cat.key+'"]');
    var v = parseFloat(inp.value);
    if (!isNaN(v) && inp.value!=='') entry[cat.key]=v;
  });
  var miscItems=[];
  document.querySelectorAll('.misc-row').forEach(function(row){
    var amt = parseFloat(row.querySelector('.misc-row-amount').value);
    var note = row.querySelector('.misc-row-note').value.trim();
    if (!isNaN(amt)&&amt>0) miscItems.push({note:note,amount:amt});
  });
  if (miscItems.length) entry.miscItems=miscItems;
  var btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='שומר...';
  try {
    await db.collection('months').doc(key).set(entry);
    allData[key]=entry;
    localStorage.removeItem('draft_'+key);
    var draftBadge = document.getElementById('draft-badge');
    if (draftBadge) draftBadge.textContent = '';
    document.getElementById('saved-badge').textContent='✓ נשמר';
    btn.classList.add('saved'); btn.textContent='✓ נשמר בהצלחה!';
    showToast('✓ החודש נשמר בענן');
  } catch(e) {
    btn.disabled=false; btn.textContent='שמור חודש';
    showToast('❌ שגיאה בשמירה');
  }
}

function renderSummary() {
  var di = document.getElementById('dist-date');
  if (!di.value) di.value = new Date().toISOString().slice(0,10);
  var totalProfit = Object.values(allData).reduce(function(s,e){ return s+monthBalance(e); }, 0);
  var totalDist   = allDist.reduce(function(s,d){ return s+d.yossi+d.shrolik; }, 0);
  var cash = totalProfit-totalDist;
  document.getElementById('cash-amount').textContent = '₪'+cash.toLocaleString();
  document.getElementById('cash-sub').textContent = offlineMode
    ? 'נתונים מקומיים – '+Object.keys(allData).length+' חודשים'
    : 'מתוך '+Object.keys(allData).length+' חודשים מוזנים';
  document.getElementById('total-profit').textContent = '₪'+totalProfit.toLocaleString();
  document.getElementById('total-dist').textContent   = '₪'+totalDist.toLocaleString();
  var list = document.getElementById('dist-list');
  list.innerHTML='';
  if (!allDist.length) { list.innerHTML='<div class="empty-msg">אין חלוקות עדיין</div>'; return; }
  allDist.forEach(function(d){
    var row = document.createElement('div');
    row.className='dist-row';
    row.innerHTML=
      '<div>'+
        '<div class="dist-date">'+d.date+'</div>'+
        '<div class="dist-names">יוסי: ₪'+d.yossi.toLocaleString()+' | שרוליק: ₪'+d.shrolik.toLocaleString()+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center">'+
        '<span class="dist-total">₪'+(d.yossi+d.shrolik).toLocaleString()+'</span>'+
        '<button class="del-btn" onclick="removeDistribution(\''+d.id+'\')" >✕</button>'+
      '</div>';
    list.appendChild(row);
  });
}

async function addDistribution() {
  var date    = document.getElementById('dist-date').value;
  var yossi   = parseFloat(document.getElementById('dist-yossi').value)||0;
  var shrolik = parseFloat(document.getElementById('dist-shrolik').value)||0;
  if (!date) { showToast('נא לבחור תאריך'); return; }
  var id = 'd'+Date.now();
  try {
    await db.collection('distributions').doc(id).set({date:date,yossi:yossi,shrolik:shrolik});
    allDist.push({id:id,date:date,yossi:yossi,shrolik:shrolik});
    allDist.sort(function(a,b){ return a.date.localeCompare(b.date); });
    document.getElementById('dist-date').value='';
    document.getElementById('dist-yossi').value='';
    document.getElementById('dist-shrolik').value='';
    renderSummary();
    showToast('✓ חלוקה נשמרה');
  } catch(e) { showToast('❌ שגיאה בשמירה'); }
}

async function removeDistribution(id) {
  try {
    await db.collection('distributions').doc(id).delete();
    allDist = allDist.filter(function(d){ return d.id!==id; });
    renderSummary();
    showToast('✓ נמחק');
  } catch(e) { showToast('❌ שגיאה במחיקה'); }
}

function renderChart() {
  var chartWrap = document.getElementById('chart-wrap');
  var svg = document.getElementById('chart-svg');
  var keys = Object.keys(allData).sort();
  if (keys.length < 2) { chartWrap.style.display='none'; return; }
  chartWrap.style.display='block';
  var balances = keys.map(function(k){ return monthBalance(allData[k]); });
  var min = Math.min.apply(null, balances);
  var max = Math.max.apply(null, balances);
  var range = max - min || 1;
  var W=300, H=90, PAD=8;
  var pts = balances.map(function(b, i){
    var x = PAD + (i / (keys.length-1)) * (W - 2*PAD);
    var y = H - PAD - ((b - min) / range) * (H - 2*PAD);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  var ptsStr = pts.join(' ');
  svg.innerHTML =
    '<polygon fill="rgba(74,144,217,0.12)" stroke="none" points="'+PAD+','+H+' '+ptsStr+' '+(W-PAD)+','+H+'"/>'+
    '<polyline fill="none" stroke="#4A90D9" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" points="'+ptsStr+'" />';
}

function renderHistory() {
  renderChart();
  var keys = Object.keys(allData).sort().reverse();
  var list = document.getElementById('history-list');
  list.innerHTML='';
  if (!keys.length) {
    list.innerHTML='<div class="no-history"><div style="font-size:32px;margin-bottom:8px">📋</div><div>עדיין לא הוזנו חודשים</div></div>';
    return;
  }
  var now = new Date();
  var curKey = monthKey(now.getFullYear(), now.getMonth());
  var byYear = {};
  keys.forEach(function(k){
    var yr = k.split('-')[0];
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(k);
  });
  var years = Object.keys(byYear).sort().reverse();
  years.forEach(function(yr){
    var yearKeys = byYear[yr];
    var yearBal = yearKeys.reduce(function(s,k){ return s+monthBalance(allData[k]||{}); }, 0);
    var yh = document.createElement('div');
    yh.className = 'year-header';
    yh.innerHTML =
      '<span class="year-label">'+yr+'</span>'+
      '<span class="year-total" style="color:'+(yearBal>=0?'#276749':'#E53E3E')+'">'+(yearBal>=0?'+':'')+'₪'+yearBal.toLocaleString()+'</span>';
    list.appendChild(yh);
    yearKeys.forEach(function(k){
      var parts = k.split('-').map(Number);
      var y=parts[0], m=parts[1];
      var entry=allData[k]||{};
      var balance=monthBalance(entry);
      var isCur = k===curKey;
      var card=document.createElement('div');
      card.className='hist-card'+(isCur?' current-month':'');
      var tags = CATEGORIES.filter(function(c){ return entry[c.key]; }).map(function(c){
        return '<span class="hist-tag" style="background:'+c.color+'18;color:'+c.color+'">'+c.icon+' '+c.label+': ₪'+entry[c.key].toLocaleString()+'</span>';
      }).concat(getMiscItems(entry).map(function(i){
        return '<span class="hist-tag" style="background:'+MISC_COLOR+'18;color:'+MISC_COLOR+'">📦 '+(i.note?escHtml(i.note):'שונות')+': ₪'+i.amount.toLocaleString()+'</span>';
      })).join('');
      var curBadge = isCur ? '<span class="current-month-badge">חודש נוכחי</span>' : '';
      card.innerHTML=
        '<div class="hist-card-top">'+
          '<span class="hist-month">'+curBadge+MONTHS_HE[m-1]+' '+y+'</span>'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<span class="hist-balance" style="color:'+(balance>=0?'#276749':'#E53E3E')+'">'+(balance>=0?'+':'')+'₪'+balance.toLocaleString()+'</span>'+
            '<button class="hist-del-btn" onclick="event.stopPropagation();deleteMonth(\''+k+'\')" >✕</button>'+
          '</div>'+
        '</div>'+
        '<div class="hist-tags">'+tags+'</div>';
      (function(yr, mn){ card.addEventListener('click', function(){ activeYear=yr; activeMonth=mn-1; navigateToView('entry'); }); })(y, m);
      list.appendChild(card);
    });
  });
}

async function deleteMonth(key) {
  if (!confirm('למחוק את הנתונים של החודש הזה?')) return;
  try {
    await db.collection('months').doc(key).delete();
    delete allData[key];
    renderHistory();
    if (monthKey(activeYear,activeMonth)===key) renderEntry();
    showToast('✓ החודש נמחק');
  } catch(e) { showToast('❌ שגיאה במחיקה'); }
}

function exportCsv() {
  var rows = [['חודש','הכנסה (שכירות)'].concat(CATEGORIES.filter(function(c){return c.key!=='rent';}).map(function(c){return c.label;})).concat(['שונות','פירוט שונות','יתרה'])];
  Object.keys(allData).sort().forEach(function(k){
    var e=allData[k];
    var mi=getMiscItems(e);
    rows.push([k,e.rent||0].concat(CATEGORIES.filter(function(c){return c.key!=='rent';}).map(function(c){return e[c.key]||0;})).concat([getMiscTotal(e),mi.map(function(i){return i.note||'שונות';}).join(' | '),monthBalance(e)]));
  });
  rows.push([]);
  rows.push(['תאריך חלוקה','יוסי','שרוליק','סהכ']);
  allDist.forEach(function(d){ rows.push([d.date,d.yossi,d.shrolik,d.yossi+d.shrolik]); });
  var csv='﻿'+rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='ניהול-נכס.csv'; a.click();
  URL.revokeObjectURL(url);
}

var _draftTimer = null;
function scheduleDraftSave() {
  if (currentView !== 'entry') return;
  var key = monthKey(activeYear, activeMonth);
  if (allData[key]) return;
  clearTimeout(_draftTimer);
  var badge = document.getElementById('draft-badge');
  if (badge) badge.textContent = '✏️ שומר טיוטה...';
  _draftTimer = setTimeout(saveDraft, 800);
}

function saveDraft() {
  var key = monthKey(activeYear, activeMonth);
  if (allData[key]) return;
  var draft = {};
  CATEGORIES.forEach(function(cat){
    var inp = document.querySelector('[data-key="'+cat.key+'"]');
    if (inp && inp.value !== '') draft[cat.key] = inp.value;
  });
  var miscItems = [];
  document.querySelectorAll('.misc-row').forEach(function(row){
    var amt = row.querySelector('.misc-row-amount').value;
    var note = row.querySelector('.misc-row-note').value.trim();
    if (amt) miscItems.push({note:note, amount:parseFloat(amt)});
  });
  if (miscItems.length) draft.miscItems = miscItems;
  try {
    localStorage.setItem('draft_'+key, JSON.stringify(draft));
    var badge = document.getElementById('draft-badge');
    if (badge) badge.textContent = '✏️ טיוטה שמורה';
  } catch(e) {}
}

function restoreDraft(key) {
  try {
    var raw = localStorage.getItem('draft_'+key);
    if (!raw) return;
    var draft = JSON.parse(raw);
    CATEGORIES.forEach(function(cat){
      var inp = document.querySelector('[data-key="'+cat.key+'"]');
      if (inp && draft[cat.key] !== undefined) inp.value = draft[cat.key];
    });
    document.getElementById('misc-rows').innerHTML = '';
    (draft.miscItems||[]).forEach(function(i){ addMiscRow(i.note, i.amount); });
    updateMiscTotal();
    updateMonthlySummary();
    var badge = document.getElementById('draft-badge');
    if (badge) badge.textContent = '✏️ שוחזרה טיוטה';
  } catch(e) {}
}

(function(){
  var startX=0, startY=0;
  document.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    if (Math.abs(dx)<50 || Math.abs(dx)<Math.abs(dy)) return;
    var idx=VIEW_ORDER.indexOf(currentView);
    if (dx>0 && idx<VIEW_ORDER.length-1) navigateToView(VIEW_ORDER[idx+1]);
    else if (dx<0 && idx>0) navigateToView(VIEW_ORDER[idx-1]);
  },{passive:true});
})();

document.getElementById('cat-list').innerHTML='<div class="loading">⏳ טוען נתונים...</div>';
loadAllData().then(function(){ renderSummary(); });
</script>

      if (!url.endsWith('sw2.js')) reg.unregister();
    });
    navigator.serviceWorker.register('./sw2.js');
  });
}

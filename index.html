function navigateToView(v) {
  const btn = document.querySelectorAll('.tab-btn')[VIEW_BTN_IDX[v]];
  switchView(v, btn);
}

function monthKey(y, m) { return y + "-" + String(m + 1).padStart(2,"0"); }

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function getMiscItems(entry) {
  if (entry.miscItems && entry.miscItems.length) return entry.miscItems;
  if (entry.misc) return [{ amount: entry.misc, note: entry.miscNote || "" }];
  return [];
}

function getMiscTotal(entry) {
  return getMiscItems(entry).reduce((s, i) => s + (i.amount || 0), 0);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

async function loadAllData() {
  try {
    const snap = await withTimeout(getDocs(collection(db, "months")), 10000);
    snap.forEach(d => { allData[d.id] = d.data(); });
    const dsnap = await withTimeout(getDocs(collection(db, "distributions")), 10000);
    allDist = [];
    dsnap.forEach(d => { allDist.push({ id: d.id, ...d.data() }); });
    allDist.sort((a,b) => a.date.localeCompare(b.date));
    await seedHistoricalData();
    return true;
  } catch(e) {
    console.error('Firebase error, using local data:', e);
    allData = { ...HISTORICAL_MONTHS };
    allDist = HISTORICAL_DISTS.map(d => ({...d}));
    allDist.sort((a,b) => a.date.localeCompare(b.date));
    const errLabel = e.message === 'timeout' ? 'timeout' : (e.code || e.message || 'שגיאה');
    document.getElementById("cash-sub").textContent = 'נתונים מקומיים (' + errLabel + ')';
    return true;
  }
}

async function seedHistoricalData() {
  if (Object.keys(allData).length > 0) return;
  for (const [k,v] of Object.entries(HISTORICAL_MONTHS)) {
    await setDoc(doc(db, "months", k), v);
    allData[k] = v;
  }
  for (const d of HISTORICAL_DISTS) {
    await setDoc(doc(db, "distributions", d.id), { date: d.date, yossi: d.yossi, shrolik: d.shrolik });
    allDist.push({...d});
  }
}

window.switchView = function(v, btn) {
  currentView = v;
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => { el.classList.remove("active"); el.setAttribute("aria-selected", "false"); });
  document.getElementById("view-" + v).classList.add("active");
  btn.classList.add("active");
  btn.setAttribute("aria-selected", "true");
  if (v === "entry") renderEntry();
  if (v === "summary") renderSummary();
  if (v === "history") renderHistory();
}

function renderEntry() {
  const key   = monthKey(activeYear, activeMonth);
  const entry = allData[key] || {};
  const saved = !!allData[key];
  document.getElementById("month-label").textContent = MONTHS_HE[activeMonth] + " " + activeYear;
  document.getElementById("saved-badge").textContent = saved ? "✓ נשמר" : "";
  const list = document.getElementById("cat-list");
  list.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const val = entry[cat.key] !== undefined ? entry[cat.key] : (saved ? "" : (cat.default !== undefined ? cat.default : ""));
    const card = document.createElement("div");
    card.className = "cat-card";
    card.innerHTML = `
      <div class="cat-icon" style="background:${cat.color}20">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-label">${cat.label}</div>
        <input class="cat-input" type="number" placeholder="0" value="${val}" min="0"
          data-key="${cat.key}" aria-label="${cat.label}"
          onfocus="this.style.borderColor='${cat.color}'"
          onblur="this.style.borderColor='#E2E8F0'"
          oninput="updateMonthlySummary()">
      </div>
      <div class="cat-value" id="val-${cat.key}" style="color:${cat.color}">
        ${val !== "" ? "₪" + Number(val).toLocaleString() : ""}
      </div>`;
    list.appendChild(card);
  });
  const miscSection = document.createElement("div");
  miscSection.className = "cat-card misc-section";
  miscSection.innerHTML = `
    <div class="misc-header">
      <div class="cat-icon" style="background:${MISC_COLOR}20">📦</div>
      <div style="flex:1;font-size:13px;font-weight:600;color:#4A5568">שונות</div>
      <div style="font-size:14px;font-weight:700;color:${MISC_COLOR}" id="misc-total"></div>
    </div>
    <div id="misc-rows"></div>
    <button class="misc-add-btn" onclick="addMiscItemRow('','')">+ הוסף שונות</button>`;
  list.appendChild(miscSection);
  getMiscItems(entry).forEach(item => addMiscItemRow(item.note, item.amount));
  updateMiscTotal();
  updateMonthlySummary();
  const btn = document.getElementById("save-btn");
  btn.classList.remove("saved");
  btn.textContent = "שמור חודש";
  btn.disabled = false;
  const now = new Date();
  document.getElementById("today-btn").disabled = (activeYear === now.getFullYear() && activeMonth === now.getMonth());
}

window.updateMonthlySummary = function() {
  let income = 0, expenses = 0;
  CATEGORIES.forEach(cat => {
    const inp = document.querySelector(`[data-key="${cat.key}"]`);
    if (!inp) return;
    const v = parseFloat(inp.value) || 0;
    const el = document.getElementById("val-" + cat.key);
    if (el) el.textContent = inp.value !== "" ? "₪" + v.toLocaleString() : "";
    if (cat.key === "rent") income = v; else expenses += v;
  });
  document.querySelectorAll(".misc-row-amount").forEach(inp => { expenses += parseFloat(inp.value) || 0; });
  const balance = income - expenses;
  document.getElementById("sum-income").textContent   = "₪" + income.toLocaleString();
  document.getElementById("sum-expenses").textContent = "₪" + expenses.toLocaleString();
  const balEl = document.getElementById("sum-balance");
  balEl.textContent = (balance >= 0 ? "+" : "") + "₪" + balance.toLocaleString();
  balEl.style.color = balance >= 0 ? "#68D391" : "#FEB2B2";
}

window.changeMonth = function(dir) {
  activeMonth -= dir;
  if (activeMonth < 0)  { activeMonth = 11; activeYear--; }
  if (activeMonth > 11) { activeMonth = 0;  activeYear++; }
  renderEntry();
}

window.goToToday = function() {
  const now = new Date();
  activeYear  = now.getFullYear();
  activeMonth = now.getMonth();
  renderEntry();
}

window.addMiscItemRow = function(note, amount) {
  const row = document.createElement("div");
  row.className = "misc-row";
  row.innerHTML = `
    <input type="text" class="misc-row-note" placeholder="פירוט" value="${escapeHtml(String(note || ""))}"
      onfocus="this.style.borderColor='${MISC_COLOR}'" onblur="this.style.borderColor='#E2E8F0'">
    <input type="number" class="misc-row-amount" placeholder="₪" min="0" value="${amount || ""}"
      onfocus="this.style.borderColor='${MISC_COLOR}'" onblur="this.style.borderColor='#E2E8F0'"
      oninput="updateMiscTotal();updateMonthlySummary()">
    <button class="misc-row-del" onclick="removeMiscItemRow(this)" aria-label="הסר שורה">✕</button>`;
  document.getElementById("misc-rows").appendChild(row);
  updateMiscTotal();
  updateMonthlySummary();
}

window.removeMiscItemRow = function(btn) {
  btn.closest(".misc-row").remove();
  updateMiscTotal();
  updateMonthlySummary();
}

function updateMiscTotal() {
  let total = 0;
  document.querySelectorAll(".misc-row-amount").forEach(inp => { total += parseFloat(inp.value) || 0; });
  const el = document.getElementById("misc-total");
  if (el) el.textContent = total > 0 ? "₪" + total.toLocaleString() : "";
}

window.saveMonth = async function() {
  const key = monthKey(activeYear, activeMonth);
  const entry = {};
  CATEGORIES.forEach(cat => {
    const inp = document.querySelector(`[data-key="${cat.key}"]`);
    const v = parseFloat(inp.value);
    if (!isNaN(v) && inp.value !== "") entry[cat.key] = v;
  });
  const miscItems = [];
  document.querySelectorAll(".misc-row").forEach(row => {
    const amount = parseFloat(row.querySelector(".misc-row-amount").value);
    const note   = row.querySelector(".misc-row-note").value.trim();
    if (!isNaN(amount) && amount > 0) miscItems.push({ note, amount });
  });
  if (miscItems.length) entry.miscItems = miscItems;
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "שומר...";
  try {
    await setDoc(doc(db, "months", key), entry);
    allData[key] = entry;
    document.getElementById("saved-badge").textContent = "✓ נשמר";
    btn.classList.add("saved");
    btn.textContent = "✓ נשמר בהצלחה!";
    showToast("✓ החודש נשמר בענן");
  } catch(e) {
    btn.disabled = false;
    btn.textContent = "שמור חודש";
    showToast("❌ שגיאה בשמירה");
  }
}

function monthBalance(entry) {
  const income      = entry.rent || 0;
  const catExpenses = CATEGORIES.filter(c => c.key !== "rent").reduce((s,c) => s + (entry[c.key]||0), 0);
  return income - catExpenses - getMiscTotal(entry);
}

function renderSummary() {
  const dateInput = document.getElementById("dist-date");
  if (!dateInput.value) dateInput.value = new Date().toISOString().slice(0,10);
  const totalProfit = Object.values(allData).reduce((s,e) => s + monthBalance(e), 0);
  const totalDist   = allDist.reduce((s,d) => s + d.yossi + d.shrolik, 0);
  const cash        = totalProfit - totalDist;
  document.getElementById("cash-amount").textContent  = "₪" + cash.toLocaleString();
  const sub = document.getElementById("cash-sub");
  if (!sub.textContent || sub.textContent === 'מתחבר לשרת...') {
    sub.textContent = "מתוך " + Object.keys(allData).length + " חודשים מוזנים";
  } else if (!sub.textContent.includes('מקומיים')) {
    sub.textContent = "מתוך " + Object.keys(allData).length + " חודשים מוזנים";
  }
  document.getElementById("total-profit").textContent = "₪" + totalProfit.toLocaleString();
  document.getElementById("total-dist").textContent   = "₪" + totalDist.toLocaleString();
  const list = document.getElementById("dist-list");
  list.innerHTML = "";
  if (allDist.length === 0) { list.innerHTML = '<div class="empty-msg">אין חלוקות עדיין</div>'; return; }
  allDist.forEach(d => {
    const row = document.createElement("div");
    row.className = "dist-row";
    row.innerHTML = `
      <div>
        <div class="dist-date">${d.date}</div>
        <div class="dist-names">יוסי: ₪${d.yossi.toLocaleString()} | שרוליק: ₪${d.shrolik.toLocaleString()}</div>
      </div>
      <div style="display:flex;align-items:center">
        <span class="dist-total">₪${(d.yossi+d.shrolik).toLocaleString()}</span>
        <button class="del-btn" onclick="removeDistribution('${d.id}')">✕</button>
      </div>`;
    list.appendChild(row);
  });
}

window.addDistribution = async function() {
  const date    = document.getElementById("dist-date").value;
  const yossi   = parseFloat(document.getElementById("dist-yossi").value) || 0;
  const shrolik = parseFloat(document.getElementById("dist-shrolik").value) || 0;
  if (!date) { showToast("נא לבחור תאריך"); return; }
  const id = "d" + Date.now();
  try {
    await setDoc(doc(db, "distributions", id), { date, yossi, shrolik });
    allDist.push({ id, date, yossi, shrolik });
    allDist.sort((a,b) => a.date.localeCompare(b.date));
    document.getElementById("dist-date").value    = "";
    document.getElementById("dist-yossi").value   = "";
    document.getElementById("dist-shrolik").value = "";
    renderSummary();
    showToast("✓ חלוקה נשמרה");
  } catch(e) { showToast("❌ שגיאה בשמירה"); }
}

window.removeDistribution = async function(id) {
  try {
    await deleteDoc(doc(db, "distributions", id));
    allDist = allDist.filter(d => d.id !== id);
    renderSummary();
    showToast("✓ נמחק");
  } catch(e) { showToast("❌ שגיאה במחיקה"); }
}

function renderHistory() {
  const keys = Object.keys(allData).sort().reverse();
  const list = document.getElementById("history-list");
  list.innerHTML = "";
  if (keys.length === 0) {
    list.innerHTML = '<div class="no-history"><div style="font-size:32px;margin-bottom:8px">📋</div><div>עדיין לא הוזנו חודשים</div></div>';
    return;
  }
  keys.forEach(k => {
    const [y,m] = k.split("-").map(Number);
    const entry  = allData[k] || {};
    const balance = monthBalance(entry);
    const card = document.createElement("div");
    card.className = "hist-card";
    const tags = [
      ...CATEGORIES.filter(c => entry[c.key]).map(c =>
        `<span class="hist-tag" style="background:${c.color}18;color:${c.color}">${c.icon} ${c.label}: ₪${entry[c.key].toLocaleString()}</span>`
      ),
      ...getMiscItems(entry).map(i =>
        `<span class="hist-tag" style="background:${MISC_COLOR}18;color:${MISC_COLOR}">📦 ${i.note ? escapeHtml(i.note) : "שונות"}: ₪${i.amount.toLocaleString()}</span>`
      )
    ].join("");
    card.innerHTML = `
      <div class="hist-card-top">
        <span class="hist-month">${MONTHS_HE[m-1]} ${y}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="hist-balance" style="color:${balance>=0?'#276749':'#E53E3E'}">${balance>=0?"+":""}₪${balance.toLocaleString()}</span>
          <button class="hist-del-btn" onclick="deleteMonth('${k}')" aria-label="מחיקת ${MONTHS_HE[m-1]} ${y}">✕</button>
        </div>
      </div>
      <div class="hist-tags">${tags}</div>`;
    list.appendChild(card);
  });
}

window.deleteMonth = async function(key) {
  if (!confirm("למחוק את הנתונים של החודש הזה?")) return;
  try {
    await deleteDoc(doc(db, "months", key));
    delete allData[key];
    renderHistory();
    if (monthKey(activeYear, activeMonth) === key) renderEntry();
    showToast("✓ החודש נמחק");
  } catch(e) { showToast("❌ שגיאה במחיקה"); }
}

window.exportCsv = function() {
  const rows = [["חודש", "הכנסה (שכירות)", ...CATEGORIES.filter(c => c.key !== "rent").map(c => c.label), "שונות", "פירוט שונות", "יתרה"]];
  Object.keys(allData).sort().forEach(k => {
    const entry = allData[k];
    const miscItems = getMiscItems(entry);
    const miscTotal = getMiscTotal(entry);
    const miscNotes = miscItems.map(i => i.note || "שונות").join(" | ");
    rows.push([k, entry.rent || 0, ...CATEGORIES.filter(c => c.key !== "rent").map(c => entry[c.key] || 0), miscTotal, miscNotes, monthBalance(entry)]);
  });
  rows.push([]);
  rows.push(["תאריך חלוקה", "יוסי", "שרוליק", "סהִִכ"]);
  allDist.forEach(d => rows.push([d.date, d.yossi, d.shrolik, d.yossi + d.shrolik]));
  const csv = "﻿" + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "ניהול-נכס.csv"; a.click();
  URL.revokeObjectURL(url);
}

// SWIPE — RTL: swipe left = history, swipe right = entry
(function() {
  let startX = 0, startY = 0;
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
    const idx = VIEW_ORDER.indexOf(currentView);
    if (dx < 0 && idx < VIEW_ORDER.length - 1) navigateToView(VIEW_ORDER[idx + 1]);
    else if (dx > 0 && idx > 0) navigateToView(VIEW_ORDER[idx - 1]);
  }, { passive: true });
})();

document.getElementById("cat-list").innerHTML = '<div class="loading">⏳ טוען נתונים...</div>';
loadAllData().then(() => { renderSummary(); });
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(async regs => {
      for (const reg of regs) {
        const url = (reg.active || reg.installing || reg.waiting || {}).scriptURL || '';
        if (!url.endsWith('sw2.js')) {
          await reg.unregister();
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      }
      navigator.serviceWorker.register('./sw2.js');
    });
  }
</script>
